<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Catan — Map Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d2b4a;
      font-family: 'Georgia', serif;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 18px 0 6px;
      font-size: 1.4em;
      letter-spacing: 4px;
      color: #f5d78e;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    #seed-label {
      font-size: 0.75em;
      color: #9ab8d8;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* ── Drop zone ─────────────────────────────────────────── */
    #drop-zone {
      border: 2px dashed #4a7aab;
      border-radius: 10px;
      padding: 22px 48px;
      margin: 0 0 18px;
      cursor: pointer;
      color: #7aaad4;
      font-size: 0.9em;
      letter-spacing: 1px;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #f5d78e;
      background: rgba(255,220,100,0.06);
      color: #f5d78e;
    }
    #drop-zone small {
      display: block;
      margin-top: 4px;
      opacity: 0.6;
      font-size: 0.85em;
    }

    /* ── Board container ───────────────────────────────────── */
    #board-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #board-svg {
      display: block;
      max-width: 100%;
    }

    /* ── Stats / legend row ────────────────────────────────── */
    #info-row {
      display: flex;
      gap: 28px;
      margin: 8px 0 24px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.82em;
    }

    .info-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 160px;
    }

    .info-card h3 {
      font-size: 0.8em;
      letter-spacing: 2px;
      color: #9ab8d8;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 3px 0;
    }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .pip-bar {
      display: inline-block;
      height: 6px;
      background: #f5d78e;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .port-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 3px 0;
    }
    .port-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>AI CATAN</header>
<div id="seed-label">MAP VIEWER</div>

<div id="drop-zone" id="dz">
  Drop a map JSON here, or click to browse
  <small>Generated by: npx ts-node save-map.ts [seed]</small>
</div>
<input type="file" id="file-input" accept=".json" style="display:none">

<div id="board-wrap">
  <svg id="board-svg"></svg>
  <div id="info-row"></div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────

const HEX_SIZE = 62;

const COLORS = {
  wood:   '#2e6b30',
  wheat:  '#c8960e',
  sheep:  '#72b85e',
  brick:  '#aa3e22',
  ore:    '#5a6070',
  desert: '#c4a96a',
  ocean:  '#14467a',
};

const BORDER_COLORS = {
  wood:   '#1e4a20',
  wheat:  '#8f6a08',
  sheep:  '#4e8a3e',
  brick:  '#7a2a14',
  ore:    '#3a4050',
  desert: '#9a7e48',
  ocean:  '#0a2a50',
};

const PORT_COLORS = {
  any:   '#9b59b6',
  wood:  '#2e8b30',
  wheat: '#e0b020',
  sheep: '#5fba4a',
  brick: '#cc4428',
  ore:   '#7888aa',
};

const PORT_LABELS = {
  any:   '3:1',
  wood:  '2:1 Wood',
  wheat: '2:1 Wheat',
  sheep: '2:1 Sheep',
  brick: '2:1 Brick',
  ore:   '2:1 Ore',
};

const PIPS = { 2:1, 3:2, 4:3, 5:4, 6:5, 8:5, 9:4, 10:3, 11:2, 12:1 };

// board.ts DIRECTIONS: [E, NE, NW, W, SW, SE]
const DIRECTIONS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];

// ── Geometry ──────────────────────────────────────────────────────────────────

function hexCenter(q, r, size, ox, oy) {
  return {
    x: ox + size * Math.sqrt(3) * (q + r / 2),
    y: oy + size * 1.5 * r,
  };
}

// Corner i (board.ts convention): junction of hex with dir[i] and dir[(i+1)%6] neighbors
// Angle: -PI/6 - PI/3*i (counterclockwise in screen space since Y is down)
function hexCorners(cx, cy, size) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = -Math.PI / 6 - (Math.PI / 3) * i;
    return [cx + size * Math.cos(a), cy + size * Math.sin(a)];
  });
}

function portFace(q, r, seaDir, size, ox, oy) {
  const { x: cx, y: cy } = hexCenter(q, r, size, ox, oy);
  const corners = hexCorners(cx, cy, size);
  const c1 = corners[(seaDir - 1 + 6) % 6];
  const c2 = corners[seaDir];
  // Midpoint of the face edge
  const mx = (c1[0] + c2[0]) / 2;
  const my = (c1[1] + c2[1]) / 2;
  // Outward direction (from hex center toward face midpoint)
  const dx = mx - cx, dy = my - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  return { c1, c2, mx, my, nx: dx / len, ny: dy / len, cx, cy };
}

// ── SVG helpers ───────────────────────────────────────────────────────────────

const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function polyPoints(corners) {
  return corners.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function renderBoard(mapData) {
  const svg = document.getElementById('board-svg');
  svg.innerHTML = '';

  const W = 760, H = 680;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  const ox = W / 2, oy = H / 2 - 10;
  const size = HEX_SIZE;

  // Ocean background
  svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: COLORS.ocean }));

  // ── Draw hexes ──────────────────────────────────────────────────────────────
  for (const hex of mapData.hexes) {
    const { x: cx, y: cy } = hexCenter(hex.q, hex.r, size, ox, oy);
    const corners = hexCorners(cx, cy, size);

    // Fill
    const poly = svgEl('polygon', {
      points: polyPoints(corners),
      fill: COLORS[hex.type] ?? '#888',
      stroke: BORDER_COLORS[hex.type] ?? '#444',
      'stroke-width': '2',
    });
    svg.appendChild(poly);

    if (hex.type === 'desert') {
      // Robber icon
      const t = svgEl('text', {
        x: cx, y: cy + 5,
        'text-anchor': 'middle',
        'font-size': '26',
        fill: 'rgba(0,0,0,0.35)',
      });
      t.textContent = '♟';
      svg.appendChild(t);

      const label = svgEl('text', {
        x: cx, y: cy + 22,
        'text-anchor': 'middle',
        'font-size': '9',
        fill: 'rgba(0,0,0,0.4)',
        'letter-spacing': '1',
      });
      label.textContent = 'DESERT';
      svg.appendChild(label);
      continue;
    }

    // Number token background circle
    const isRed = hex.number === 6 || hex.number === 8;
    const tokenR = 18;
    svg.appendChild(svgEl('circle', {
      cx, cy,
      r: tokenR,
      fill: isRed ? '#f5ede0' : '#f5f0e8',
      stroke: isRed ? '#c44' : '#bbb',
      'stroke-width': '1.5',
    }));

    // Number text
    const numText = svgEl('text', {
      x: cx, y: cy + 5,
      'text-anchor': 'middle',
      'font-size': '16',
      'font-weight': 'bold',
      'font-family': 'Georgia, serif',
      fill: isRed ? '#c00' : '#222',
    });
    numText.textContent = hex.number ?? '';
    svg.appendChild(numText);

    // Pip dots
    const pips = PIPS[hex.number] ?? 0;
    const dotSpacing = 5;
    const totalDotW = (pips - 1) * dotSpacing;
    for (let p = 0; p < pips; p++) {
      const dx = -totalDotW / 2 + p * dotSpacing;
      svg.appendChild(svgEl('circle', {
        cx: cx + dx, cy: cy + tokenR - 5,
        r: 1.8,
        fill: isRed ? '#c00' : '#444',
      }));
    }

    // Resource label (small, top of hex)
    const resLabel = svgEl('text', {
      x: cx, y: cy - tokenR - 6,
      'text-anchor': 'middle',
      'font-size': '8',
      'letter-spacing': '0.5',
      fill: 'rgba(255,255,255,0.75)',
    });
    resLabel.textContent = hex.type.toUpperCase();
    svg.appendChild(resLabel);
  }

  // ── Draw ports ──────────────────────────────────────────────────────────────
  for (const port of mapData.ports) {
    const col = PORT_COLORS[port.type] ?? '#aaa';
    const face = portFace(port.q, port.r, port.seaDir, size, ox, oy);

    // Thick colored line on the coastal edge
    const line = svgEl('line', {
      x1: face.c1[0], y1: face.c1[1],
      x2: face.c2[0], y2: face.c2[1],
      stroke: col,
      'stroke-width': '5',
      'stroke-linecap': 'round',
    });
    svg.appendChild(line);

    // Port label outside the board
    const labelDist = size * 1.08;
    const lx = face.cx + face.nx * (size * 0.87 + labelDist * 0.35);
    const ly = face.cy + face.ny * (size * 0.87 + labelDist * 0.35);

    // Background pill
    const bgW = port.type === 'any' ? 28 : 48;
    svg.appendChild(svgEl('rect', {
      x: lx - bgW / 2, y: ly - 9,
      width: bgW, height: 16,
      rx: 4,
      fill: col,
      opacity: '0.92',
    }));

    const lt = svgEl('text', {
      x: lx, y: ly + 4,
      'text-anchor': 'middle',
      'font-size': '9',
      'font-weight': 'bold',
      'font-family': 'Georgia, serif',
      fill: '#fff',
    });
    lt.textContent = port.type === 'any' ? '3:1' : `2:1 ${port.type[0].toUpperCase()}`;
    svg.appendChild(lt);

    // Small connector lines from edge midpoint to label
    const emx = (face.c1[0] + face.c2[0]) / 2;
    const emy = (face.c1[1] + face.c2[1]) / 2;
    svg.appendChild(svgEl('line', {
      x1: emx, y1: emy,
      x2: lx, y2: ly,
      stroke: col,
      'stroke-width': '1.5',
      'stroke-dasharray': '3,2',
      opacity: '0.6',
    }));
  }

  // ── Update UI ────────────────────────────────────────────────────────────────
  document.getElementById('seed-label').textContent = `SEED: ${mapData.seed}`;
  document.getElementById('board-wrap').style.display = 'flex';
  document.getElementById('drop-zone').style.display = 'none';

  renderInfo(mapData);
}

// ── Info panel ────────────────────────────────────────────────────────────────

function renderInfo(mapData) {
  const row = document.getElementById('info-row');
  row.innerHTML = '';

  // Resource production
  const totals = { wood: 0, wheat: 0, sheep: 0, brick: 0, ore: 0 };
  for (const h of mapData.hexes) {
    if (h.type === 'desert') continue;
    totals[h.type] = (totals[h.type] ?? 0) + (PIPS[h.number] ?? 0);
  }
  const maxPips = Math.max(...Object.values(totals));

  const resCard = document.createElement('div');
  resCard.className = 'info-card';
  resCard.innerHTML = '<h3>Production</h3>';
  for (const [res, pips] of Object.entries(totals).sort(([,a],[,b]) => b - a)) {
    const barW = Math.round((pips / maxPips) * 60);
    const row2 = document.createElement('div');
    row2.className = 'legend-row';
    row2.innerHTML = `
      <div class="legend-swatch" style="background:${COLORS[res]}"></div>
      <span style="width:40px;font-size:0.9em">${res}</span>
      <span class="pip-bar" style="width:${barW}px"></span>
      <span style="color:#9ab8d8;margin-left:2px">${pips}</span>
    `;
    resCard.appendChild(row2);
  }
  row.appendChild(resCard);

  // Number distribution
  const numCounts = {};
  for (const h of mapData.hexes) {
    if (h.number) numCounts[h.number] = (numCounts[h.number] ?? 0) + 1;
  }
  const numCard = document.createElement('div');
  numCard.className = 'info-card';
  numCard.innerHTML = '<h3>Numbers</h3>';
  for (const [num, count] of Object.entries(numCounts).sort(([a],[b]) => +a - +b)) {
    const isRed = num === '6' || num === '8';
    const pips = PIPS[+num] ?? 0;
    const dots = '✦'.repeat(pips);
    const r = document.createElement('div');
    r.className = 'legend-row';
    r.innerHTML = `
      <span style="width:22px;text-align:right;font-weight:bold;color:${isRed?'#e05':'#7af'}">${num}</span>
      <span style="color:#f5d78e;width:40px;font-size:0.85em">${dots}</span>
      <span style="color:#9ab8d8">×${count}</span>
    `;
    numCard.appendChild(r);
  }
  row.appendChild(numCard);

  // Ports
  const portCard = document.createElement('div');
  portCard.className = 'info-card';
  portCard.innerHTML = '<h3>Ports</h3>';
  for (const port of mapData.ports) {
    const r = document.createElement('div');
    r.className = 'port-row';
    r.innerHTML = `
      <div class="port-dot" style="background:${PORT_COLORS[port.type]}"></div>
      <span>${PORT_LABELS[port.type] ?? port.type}</span>
    `;
    portCard.appendChild(r);
  }
  row.appendChild(portCard);
}

// ── File loading ──────────────────────────────────────────────────────────────

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      renderBoard(data);
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');

dz.addEventListener('click', () => fi.click());
fi.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
